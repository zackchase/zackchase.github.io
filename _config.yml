# SITE CONFIGURATION
title: ACMI Lab # your site title
author: ACMI Lab # You :P
description: > # Meta description of Homepage
  The Approximately Correct Machine Intelligence (ACMI) Lab researches core machine learning methodology,
  its social impacts, and applications to healthcare. Key initiative include healthcare, robustness,
  fairness & accountability, natural language processing (NLP), causality, and deep learning. 
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://zackchase.github.io/" # the base hostname & protocol for your site, e.g. http://example.com


# THEME SETTINGS
navigation: # Navigation links
  - {name: 'Home', link: '/'}
  - {name: 'About', link: '/about'}
  - {name: 'Contact', link: '/contact'}

tagline: >
  Modern Jekyll theme focused on speed performance &amp; SEO best practices

hero_img: posts/sleek_lg.jpg # Main background image: use the path from /assets/img/ => This will output /assets/img/posts/sleek_lg.jpg

email: acmilab@cs.cmu.edu # email for form submission

twitter_username: acmi_lab # replace with your_twitter_username or comment to remove link from footer
github_username:  acmi_lab # replace with your_github_username or comment to remove link from footer


# google_tag_manager: GTM-XXXXXXX # Uncomment to enable GTM. Replace GTM-XXXXXXX with your GTM container ID

service_worker: true

# BUILD SETTINGS
markdown: kramdown
highlighter: rouge # or pygments or null
# theme: jekyll-sleek # Uncomment if you're using the theme as a ruby gem
exclude:
  - README.md
  - node_modules
  - script
  - package.json
  - package-lock.json
  - Gemfile
  - Gemfile.lock
  - vendor
  - npm-debug.log
  - gulpfile.js
  - sleek.jpg

include: ['_pages']
permalink: /:title/

compress_html:
  clippings: all

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
